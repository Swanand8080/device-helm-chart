{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-device" .Release.Name }}
  namespace: {{ .Release.Namespace }}
  {{- if .Values.ingress.device.annotations }}
  annotations:
    {{- toYaml .Values.ingress.device.annotations | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName | default "nginx" }}
  tls:
    - hosts:
        - {{ .Values.ingress.device.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName | quote }}
  rules:
    - host: {{ .Values.ingress.device.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-device" .Release.Name }}
                port:
                  number: {{ .Values.device.service.port | default 80 }}

{{- end }}
